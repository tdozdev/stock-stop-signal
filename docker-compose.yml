services:
  sss:
    build: .
    container_name: stock-stop-signal
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      SSS_DB_PATH: /data/sss.db
      SSS_SCHEDULE_HOUR: 8
      SSS_SCHEDULE_MINUTE: 10
      SSS_MARKET_PROVIDER: ${SSS_MARKET_PROVIDER:-}
      SSS_KRX_API_BASE_URL: ${SSS_KRX_API_BASE_URL:-}
      SSS_KRX_API_KEY: ${SSS_KRX_API_KEY:-}
      SSS_KRX_KOSPI_DAILY_PATH: ${SSS_KRX_KOSPI_DAILY_PATH:-}
      SSS_KRX_KOSDAQ_DAILY_PATH: ${SSS_KRX_KOSDAQ_DAILY_PATH:-}
      SSS_KRX_ETF_DAILY_PATH: ${SSS_KRX_ETF_DAILY_PATH:-}
      SSS_KRX_KOSPI_INDEX_DAILY_PATH: ${SSS_KRX_KOSPI_INDEX_DAILY_PATH:-}
      SSS_KRX_DATE_PARAM: ${SSS_KRX_DATE_PARAM:-}
      SSS_KRX_TIMEOUT_SEC: ${SSS_KRX_TIMEOUT_SEC:-}
      SSS_CALENDAR_PAST_DAYS: 365
      SSS_CALENDAR_FUTURE_DAYS: 730
      SSS_CALENDAR_REFILL_THRESHOLD_DAYS: 90
    volumes:
      - ./data:/data
    restart: unless-stopped
